<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script>
const VISION_KEY = 'AIzaSyCFoccrFL9LZ8HjYNtXJWRtQeWkXJZeovc';
let currentFile = null;
let currentType = '';

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('resultCard').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function scanVoucher() {
  if (!currentFile) return;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Σκανάρισμα...';
  showStatus('Ανάλυση voucher...', 'loading');

  try {
    const base64 = await fileToBase64(currentFile);
    const base64Data = base64.split(',')[1];

    const response = await fetch(
      `https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image: { content: base64Data },
            features: [{ type: 'TEXT_DETECTION', maxResults: 1 }]
          }]
        })
      }
    );

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.responses[0]?.fullTextAnnotation?.text || '';
    if (!text) throw new Error('Δεν βρέθηκε κείμενο');

    fillForm(text);
    showStatus('✅ Voucher αναλύθηκε!', 'success');

  } catch (err) {
    showStatus('❌ Σφάλμα: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '🔍 Σκανάρισμα Voucher';
}

function addDays(dateStr, days) {
  // Parse DD/MM/YYYY or DD.MM.YY
  let d;
  if (dateStr.includes('/')) {
    const parts = dateStr.split('/');
    const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    d = new Date(`${year}-${parts[1]}-${parts[0]}`);
  } else if (dateStr.includes('.')) {
    const parts = dateStr.split('.');
    const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    d = new Date(`${year}-${parts[1]}-${parts[0]}`);
  } else {
    return dateStr;
  }
  d.setDate(d.getDate() + days);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// Subtract N hours from a date+time, rolling the date back a day if needed
function subtractHoursFromDateTime(dateStr, timeStr, hours) {
  if (!dateStr || !timeStr) return { date: dateStr, time: timeStr };
  const [hh, mm] = timeStr.split(':').map(Number);
  let totalMinutes = hh * 60 + mm - hours * 60;
  let dayOffset = 0;
  while (totalMinutes < 0) { totalMinutes += 24 * 60; dayOffset -= 1; }
  while (totalMinutes >= 24 * 60) { totalMinutes -= 24 * 60; dayOffset += 1; }
  const newHH = Math.floor(totalMinutes / 60);
  const newMM = totalMinutes % 60;
  const newTime = `${String(newHH).padStart(2,'0')}:${String(newMM).padStart(2,'0')}`;
  const newDate = dayOffset !== 0 ? addDays(dateStr, dayOffset) : dateStr;
  return { date: newDate, time: newTime };
}

// Shared +/-5 day package estimate, used by formats B, C, D (single-leg vouchers)
// hasFlightInfo: true when `time` is an actual flight time (so departures get -2h pickup),
// false when `time` is already a manually-requested pickup time (left unchanged).
function applyLegEstimate(isInbound, date, time, hotel, hasFlightInfo) {
  if (!date) {
    return {
      service1Date: '',
      dropoff1: isInbound ? hotel : '',
      estimatedHours: '',
      service3DateTime: isInbound ? '' : (time || ''),
      pickup3: isInbound ? '' : hotel
    };
  }
  if (isInbound) {
    const departureDate = addDays(date, 5);
    return {
      service1Date: date,
      dropoff1: hotel,
      estimatedHours: `${date} - ${departureDate}`,
      service3DateTime: departureDate,
      pickup3: hotel
    };
  } else {
    const arrivalDate = addDays(date, -5);
    let service3DateTime = date;
    if (time) {
      if (hasFlightInfo) {
        const pickup = subtractHoursFromDateTime(date, time, 2);
        service3DateTime = `${pickup.date} ${pickup.time}`;
      } else {
        service3DateTime = `${date} ${time}`;
      }
    }
    return {
      service1Date: arrivalDate,
      dropoff1: hotel,
      estimatedHours: `${arrivalDate} - ${date}`,
      service3DateTime,
      pickup3: hotel
    };
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  if (dateStr.includes('.')) {
    const parts = dateStr.split('.');
    return `${parts[0]}/${parts[1]}/20${parts[2]}`;
  }
  return dateStr;
}

function extractGuestName(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const idx = lines.findIndex(l => /guest\s*name/i.test(l));
  if (idx === -1) return '';

  let candidate = '';

  // Case 1: value is on the same line as the label, e.g. "Guest Name: Börner, Julia"
  const sameLineMatch = lines[idx].match(/guest\s*name[:\s]+(.+)/i);
  if (sameLineMatch && sameLineMatch[1].trim()) {
    candidate = sameLineMatch[1].trim();
  } else {
    // Case 2: label sits alone on its own line, value follows on one of the next few lines
    for (let i = idx + 1; i < Math.min(idx + 4, lines.length); i++) {
      if (/[:]/.test(lines[i])) continue; // skip other labels like "DropOff Point:"
      // Strip OCR-glued trailing codes from a neighboring column before validating
      let cleaned = lines[i].replace(/\s+[A-Z]{1,3}\d{2,}\b.*$/, '').trim();
      cleaned = cleaned.replace(/\s{2,}.*$/, '').trim();
      // A name line: letters (incl. accented) possibly with a comma
      if (/^[A-Za-zÀ-ÖØ-öø-ÿ]+[,\s][A-Za-zÀ-ÖØ-öø-ÿ .]+$/.test(cleaned)) {
        candidate = cleaned;
        break;
      }
    }
  }
  if (!candidate) return '';

  // Strip OCR-glued trailing codes from the neighboring column, e.g. "Börner, Julia S0000"
  candidate = candidate.replace(/\s+[A-Z]{1,3}\d{2,}\b.*$/, '').trim();
  candidate = candidate.replace(/\s{2,}.*$/, '').trim();

  // Reverse "Last, First" to "First Last"
  if (candidate.includes(',')) {
    const parts = candidate.split(',');
    if (parts.length === 2 && parts[0].trim() && parts[1].trim()) {
      candidate = `${parts[1].trim()} ${parts[0].trim()}`;
    }
  }
  return candidate;
}

function detectFormat(text) {
  if (/CANDIA\s+TRAVEL\s+BUREAU/i.test(text)) return 'D';
  if (/prepaid/i.test(text) && /passengers?/i.test(text)) return 'C';
  if (/Όνομα\s*:/.test(text) && /Άτομα\s*:/.test(text)) return 'B';
  if (/Trend\s+Touristic/i.test(text) || /Transfer\s+Order\s+No[:\s]*\d+/i.test(text)) return 'E';
  return 'A';
}

function extractFormatA(text) {
  const isInbound = /[Ii]nbound/.test(text) || /ΑΦΙΞΗ/.test(text) || /Arrival/.test(text);

  const groupMatch = text.match(/[Gg]rouping\s+[Ii]d[:\s]+(\d+)/) ||
                     text.match(/No\.\s*([\d.]+)/) ||
                     text.match(/[A-Z](\d{6,})/);
  const groupId = groupMatch ? groupMatch[1] || groupMatch[0] : '';

  const dateMatch = text.match(/[Dd]ate[:\s]+(\d{2}[.\/-]\d{2}[.\/-]\d{2,4})/) ||
                    text.match(/(\d{2}[.\/-]\d{2}[.\/-]\d{2,4})/);
  const rawDate = dateMatch ? dateMatch[1] : '';
  const voucherDate = formatDate(rawDate);

  const clientName = extractGuestName(text);

  const paxMatch = text.match(/A-C-I\s*\n?\s*(\d+-\d+-\d+)/);
  const pax = paxMatch ? paxMatch[1] : '';

  const flightCodeMatch = text.match(/[A-Z]{3}-[A-Z]{3}\s+([A-Z]{2}\s*\d{3,5})/i) ||
                          text.match(/([A-Z]{2}\s*\d{3,5})\s*\(?\d{2}:\d{2}\)?/i);
  const flightCode = flightCodeMatch ? flightCodeMatch[1].trim() : '';
  const flightTimeMatch = text.match(/[Ff]irst\/?[Ll]ast\s+[Ff]light\s+[Tt]ime[:\s]+(\d{2}:\d{2})/);
  const flightTime = flightTimeMatch ? flightTimeMatch[1] : '';
  const flightNum = flightCode ? `${flightCode} - ${flightTime}` : flightTime;

  let hotel = '';
  if (isInbound) {
    const hotelMatch = text.match(/[Dd]rop.?[Oo]ff\s+[Pp]oint[:\s]+([^\n]+)/);
    hotel = hotelMatch ? hotelMatch[1].trim() : '';
  } else {
    const hotelNameMatch = text.match(/[Hh]otel\s+[Nn]ame\s+([^\n]+)/);
    if (hotelNameMatch) hotel = hotelNameMatch[1].replace(/\s+[A-Z]{2,3}-[A-Z]{2,3}.*/,'').trim();
    if (!hotel) {
      const pickupMatch = text.match(/[Pp]ick.?[Uu]p\s+[Pp]oint[:\s]+([^\n]+)/);
      if (pickupMatch) hotel = pickupMatch[1].replace(/\[.*?\]/g,'').trim();
    }
    if (!hotel) {
      const startMatch = text.match(/[Ss]tart\s+[Pp]oint[:\s]+([^\n]+)/);
      if (startMatch) hotel = startMatch[1].trim();
    }
  }

  let service1Date, service3DateTime, estimatedHours;
  if (isInbound) {
    const arrivalDate = voucherDate;
    const departureDate = addDays(arrivalDate, 5);
    service1Date = arrivalDate;
    estimatedHours = `${arrivalDate} - ${departureDate}`;
    service3DateTime = departureDate;
  } else {
    const departureDate = voucherDate;
    const arrivalDate = addDays(departureDate, -5);
    service1Date = arrivalDate;
    estimatedHours = `${arrivalDate} - ${departureDate}`;
    // Pickup time = flight time minus 2 hours (not any separate "pickup/start time" field)
    if (flightTime) {
      const pickup = subtractHoursFromDateTime(departureDate, flightTime, 2);
      service3DateTime = `${pickup.date} ${pickup.time}`;
    } else {
      service3DateTime = departureDate;
    }
  }

  return {
    isInbound, bookingRef: groupId, platformNum: '', clientName, pax,
    service1Date, flight: flightNum, dropoff1: hotel, hotel2: hotel,
    estimatedHours, service3DateTime, pickup3: hotel
  };
}

// Format B: Greek email-style single transfer request (e.g. resort -> taxi office)
// Labels: Ημερομηνία / Ώρα / Όνομα / Άτομα / Δωμάτιο / Από / Προς / Αριθμός Πτήσης
// This format describes ONE leg only, so the opposite leg is left blank for manual entry.
function extractFormatB(text) {
  const dateM = text.match(/Ημερομηνία\s*:?\s*(\d{2}\/\d{2}\/\d{4})/);
  const timeM = text.match(/Ώρα\s*:?\s*(\d{2}:\d{2})/);
  const nameM = text.match(/Όνομα\s*:?\s*([^\n]+)/);
  const paxM = text.match(/Άτομα\s*:?\s*(\d+)/);
  const fromM = text.match(/Από\s*:?\s*([^\n]+)/);
  const toM = text.match(/Προς\s*:?\s*([^\n]+)/);
  const flightM = text.match(/Αριθμός\s+Πτήσης\s*:?\s*([A-Za-z0-9]+)/);

  const from = fromM ? fromM[1].trim() : '';
  const to = toM ? toM[1].trim() : '';

  let isInbound;
  if (/ΑΦΙΞΗ/.test(text)) isInbound = true;
  else if (/ΑΝΑΧΩΡΗΣΗ/.test(text)) isInbound = false;
  else isInbound = /airport/i.test(from);

  const hotel = /airport/i.test(from) ? to : from;
  const date = dateM ? dateM[1] : '';
  const time = timeM ? timeM[1] : '';
  const flight = flightM ? `${flightM[1]}${time ? ' - ' + time : ''}` : '';

  const legs = applyLegEstimate(isInbound, date, time, hotel, !!flightM);

  return {
    isInbound, bookingRef: '', platformNum: '',
    clientName: nameM ? nameM[1].trim() : '',
    pax: paxM ? paxM[1] : '',
    flight, hotel2: hotel,
    ...legs
  };
}

// Format C: agency sheet (e.g. "Dimitris Katikas") with booking code, route, "Prepaid", client name & phone.
// Also describes ONE leg only.
function extractFormatC(text) {
  const refM = text.match(/\b([A-Z]\d{5,6})\b/);
  const dtM = text.match(/(\d{1,2})\/(\d{1,2})\s+(\d{2}:\d{2})/);
  const routeM = text.match(/([A-Za-z]+)\s+Airport\s+([A-Z]{1,3}\d{3,5})\s*-\s*([A-Za-z .]+)/i);
  const paxM = text.match(/(\d+-\d+)\s*passengers?/i);

  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const prepaidIdx = lines.findIndex(l => /prepaid/i.test(l));
  let clientName = '';
  if (prepaidIdx !== -1) {
    for (let i = prepaidIdx + 1; i < Math.min(prepaidIdx + 3, lines.length); i++) {
      if (/^[A-Za-zÀ-ÖØ-öø-ÿ]+(\s[A-Za-zÀ-ÖØ-öø-ÿ]+)+$/.test(lines[i]) && !/^\+?\d/.test(lines[i])) {
        clientName = lines[i];
        break;
      }
    }
  }

  let date = '';
  const now = new Date();
  if (dtM) {
    date = `${dtM[1].padStart(2, '0')}/${dtM[2].padStart(2, '0')}/${now.getFullYear()}`;
  }
  const time = dtM ? dtM[3] : '';

  const flightCode = routeM ? routeM[2] : '';
  const hotel = routeM ? routeM[3].trim() : '';

  const isInbound = /ΑΝΑΧΩΡΗΣΗ/.test(text) ? false : true;
  const legs = applyLegEstimate(isInbound, date, time, hotel, true);

  return {
    isInbound, bookingRef: refM ? refM[1] : '', platformNum: '', clientName,
    pax: paxM ? paxM[1] : '',
    flight: flightCode ? `${flightCode}${time ? ' - ' + time : ''}` : '',
    hotel2: hotel,
    ...legs
  };
}

// Format D: CANDIA TRAVEL BUREAU tabular voucher. Also describes ONE leg only.
// Note: client name in the table can come out compressed by OCR when there are
// multiple passengers on one line - double check this field manually.
function extractFormatD(text) {
  // Strip known table header labels that often get OCR-glued directly onto data
  // (e.g. "Pax ClientELENI BEACH APT htl STALIS")
  const cleaned = text
    .replace(/Time\s*\/\s*Place/gi, ' ')
    .replace(/Pax\s+Client/gi, ' ')
    .replace(/AD\s+CH\s+CF\s+Inf\s+Flight/gi, ' ')
    .replace(/\bAgent\b/gi, ' ');

  const refM = cleaned.match(/No\.\s*([\d.\-]+)/i);
  const dateTypeM = cleaned.match(/(\d{2}\/\d{2}\/\d{2,4})\s+(Arrival|Departure)\s+Transfer/i);
  const routeM = cleaned.match(/([A-Z][A-Z]+(?:\s[A-Z]+)*)\s+AIRPORT\s*-\s*([A-Z][A-Z]+(?:\s[A-Z]+)*)/i);
  const timeM = cleaned.match(/(\d{2}:\d{2})\s+[A-Z][A-Z .]*?AIRPORT/i);
  const paxM = cleaned.match(/Pax\s*:?\s*(\d+)/i);
  const flightM = cleaned.match(/\b([A-Z]{2}\d{3,5})\b/);
  // Hotel / drop-off address; optionally swallow a continuation address line (e.g. "...MAIN ROAD")
  const placeM = cleaned.match(/([A-Z][A-Za-z]*(?:\s[A-Za-z.]+)*\s(?:APT|HTL|HOTEL)\s[A-Za-z .]+(?:\n[A-Z][A-Za-z .]*(?:ROAD|STREET|AVE|BLVD|STR)\.?[A-Za-z .]*)?)/i);

  // Client name: the ALL-CAPS run sitting between the hotel address and the flight code
  // (avoids the header-glue problem and doesn't depend on exact digit spacing)
  let clientName = '';
  if (placeM && flightM) {
    const placeEnd = cleaned.indexOf(placeM[0]) + placeM[0].length;
    const flightIdx = cleaned.indexOf(flightM[0], placeEnd);
    if (flightIdx > placeEnd) {
      const segment = cleaned.slice(placeEnd, flightIdx);
      const nameMatch = segment.match(/\b[A-Z]{2,}(?:\s[A-Z]{2,}){0,2}\b/);
      if (nameMatch) clientName = nameMatch[0].trim();
    }
  }

  const isInbound = dateTypeM ? /arrival/i.test(dateTypeM[2]) : /ΑΦΙΞΗ/.test(text);

  let date = '';
  if (dateTypeM) {
    const parts = dateTypeM[1].split('/');
    const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    date = `${parts[0]}/${parts[1]}/${year}`;
  }

  const routeFrom = routeM ? `${routeM[1].trim()} AIRPORT` : '';
  const routeTo = routeM ? routeM[2].trim() : '';
  const hotel = placeM ? placeM[1].trim().replace(/\s+/g, ' ') : (isInbound ? routeTo : routeFrom);
  const time = timeM ? timeM[1] : '';

  const legs = applyLegEstimate(isInbound, date, time, hotel, true);

  return {
    isInbound, bookingRef: refM ? refM[1].trim() : '', platformNum: '',
    clientName, pax: paxM ? paxM[1] : '',
    flight: flightM ? flightM[1] : '',
    hotel2: hotel,
    ...legs
  };
}

// Format E: Trend Touristic Services SA. Also describes ONE leg only.
function extractFormatE(text) {
  const groupMatch = text.match(/Transfer\s+Order\s+No[:\s]*(\d+)/i);
  const bookingRef = groupMatch ? groupMatch[1] : '';

  const dateMatch = text.match(/Transfer\s+Date[:\s]*(\d{2}\/\d{2}\/\d{2,4})/i);
  const date = dateMatch ? dateMatch[1] : '';

  const timeMatch = text.match(/Start\s+Time[:\s]*(\d{2}:\d{2})/i);
  const time = timeMatch ? timeMatch[1] : '';

  const isInbound = (/Departure\s+Transfer/i.test(text) || /ΑΝΑΧΩΡΗΣΗ/.test(text)) ? false : true;

  const paxMatch = text.match(/Total\s+Pax[:\s]*(\d+)/i);
  const pax = paxMatch ? paxMatch[1] : '';

  // Flight code - try a few patterns since OCR line-breaks vary:
  // 1) top summary line "A3 308 - 12:20 (3)"
  // 2) table row "... 3 0 0 A3 308 Gate 1 Travel ..." (after the Adl/Chd/Inf digits)
  let flightCode = '';
  const flightMatch1 = text.match(/\b([A-Z]{1,2}\d?\s*\d{2,4})\s*-\s*\d{2}:\d{2}/);
  const flightMatch2 = text.match(/\d\s+\d\s+\d\s+([A-Z]{1,2}\d?\s?\d{2,4})\s+[A-Za-z]/);
  if (flightMatch1) flightCode = flightMatch1[1];
  else if (flightMatch2) flightCode = flightMatch2[1];
  flightCode = flightCode.replace(/\s+/g, ' ').trim();
  // Always show the time even if no flight code was found
  const flight = [flightCode, time].filter(Boolean).join(' - ');

  // Hotel + client surname from the table row, e.g.
  // "12:20 Ibis Styles Hotel\nIbis Styles Heraklion Central Hotel   Ridolfo   3 0 0 A3 308 ..."
  const placeMatch = text.match(/\d{2}:\d{2}\s+[A-Za-z][A-Za-z\s]*\n([A-Za-z][A-Za-z .]+?(?:Hotel|Resort|Suites|Villas|Studios|Apartments|Apts))\s+([A-Z][a-z]+)\s+\d/);
  let hotel = '';
  let clientName = '';
  if (placeMatch) {
    hotel = placeMatch[1].trim();
    clientName = placeMatch[2].trim();
  } else {
    const shortPlace = text.match(/\d{2}:\d{2}\s+([A-Za-z][A-Za-z\s]+)/);
    if (shortPlace) hotel = shortPlace[1].trim();
  }

  const legs = applyLegEstimate(isInbound, date, time, hotel, true);

  return {
    isInbound, bookingRef, platformNum: '', clientName, pax,
    flight, hotel2: hotel,
    ...legs
  };
}

function fillForm(text) {
  const format = detectFormat(text);
  const extractors = { A: extractFormatA, B: extractFormatB, C: extractFormatC, D: extractFormatD, E: extractFormatE };
  const result = extractors[format](text);

  currentType = result.isInbound ? 'ΑΦΙΞΗ' : 'ΑΝΑΧΩΡΗΣΗ';

  const badge = document.getElementById('typeBadge');
  badge.innerHTML = currentType === 'ΑΦΙΞΗ'
    ? '<span class="type-badge type-inbound">✈️ ΑΦΙΞΗ</span>'
    : '<span class="type-badge type-outbound">✈️ ΑΝΑΧΩΡΗΣΗ</span>';

  document.getElementById('fBookingRef').value = result.bookingRef || '';
  document.getElementById('fPlatformNum').value = result.platformNum || '';
  document.getElementById('fClientName').value = result.clientName || '';
  document.getElementById('fPax').value = result.pax || '';
  document.getElementById('fService1Date').value = result.service1Date || '';
  document.getElementById('fFlight').value = result.flight || '';
  document.getElementById('fDropoff1').value = result.dropoff1 || '';
  document.getElementById('fHotel2').value = result.hotel2 || '';
  document.getElementById('fEstimatedHours').value = result.estimatedHours || '';
  document.getElementById('fService3DateTime').value = result.service3DateTime || '';
  document.getElementById('fPickup3').value = result.pickup3 || '';

  document.getElementById('resultCard').style.display = 'block';
}

function copyField(id, btn) {
  const val = document.getElementById(id).value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}

async function exportExcel() {
  const val = id => document.getElementById(id).value;
  const bookingRef = val('fBookingRef');

  const workbook = new ExcelJS.Workbook();
  const sheet = workbook.addWorksheet('ΔΙΑΤΑΚΤΙΚΗ');

  sheet.columns = [{ width: 42 }, { width: 32 }];

  // Print setup: A4 by default, but fit-to-page so it also prints cleanly on A5
  sheet.pageSetup = {
    paperSize: 9, // 9 = A4 (11 = A5); fitToPage below makes it scale correctly on either
    orientation: 'portrait',
    fitToPage: true,
    fitToWidth: 1,
    fitToHeight: 1,
    horizontalCentered: true,
    margins: { left: 0.35, right: 0.35, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 }
  };

  const thinBorder = {
    top: { style: 'thin', color: { argb: 'FF999999' } },
    left: { style: 'thin', color: { argb: 'FF999999' } },
    bottom: { style: 'thin', color: { argb: 'FF999999' } },
    right: { style: 'thin', color: { argb: 'FF999999' } }
  };

  const rows = [
    { type: 'title', text: 'PACKAGE SERVICE / ΔΙΑΤΑΚΤΙΚΗ ΠΑΚΕΤΟΥ ΥΠΗΡΕΣΙΩΝ' },
    { type: 'spacer' },
    { type: 'section', text: 'CLIENT INFORMATION / ΠΛΗΡΟΦΟΡΙΕΣ ΠΕΛΑΤΗ' },
    { type: 'data', label: 'BOOKING REFERENCE / ΑΡ.ΚΡΑΤΗΣΗΣ', value: bookingRef },
    { type: 'data', label: 'ΑΡΙΘΜΟΣ ΗΛΕΚΤΡΟΝΙΚΗΣ ΠΛΑΤΦΟΡΜΑΣ', value: val('fPlatformNum') },
    { type: 'data', label: 'CLIENT NAME / ΟΝΟΜΑ ΠΕΛΑΤΗ', value: val('fClientName') },
    { type: 'data', label: 'PAX NUMBER / ΑΡΙΘΜΟΣ ΕΠΙΒΑΤΩΝ', value: val('fPax') },
    { type: 'spacer' },
    { type: 'section', text: 'SERVICE 1 / ΥΠΗΡΕΣΙΑ 1' },
    { type: 'data', label: 'DATE OF SERVICE / ΗΜΕΡΟΜΗΝΙΑ ΥΠΗΡΕΣΙΑΣ', value: val('fService1Date') },
    { type: 'data', label: 'ARRIVAL FLIGHT NUMBER / ΑΡΙΘΜΟΣ ΠΤΗΣΗΣ', value: val('fFlight') },
    { type: 'data', label: 'PICK UP POINT / ΣΗΜΕΙΟ ΠΑΡΑΛΑΒΗΣ', value: 'HER AIRPORT' },
    { type: 'data', label: 'DROP OFF POINT / ΣΗΜΕΙΟ ΑΠΟΒΙΒΑΣΗΣ', value: val('fDropoff1') },
    { type: 'spacer' },
    { type: 'section', text: 'SERVICE 2 / ΥΠΗΡΕΣΙΑ 2' },
    { type: 'data', label: 'HOTEL ACCOMMODATION / ΞΕΝΟΔΟΧΕΙΑΚΗ ΔΙΑΜΟΝΗ', value: val('fHotel2') },
    { type: 'data', label: 'ESTIMATED HOURS / ΠΡΟΒΛΕΠΟΜΕΝΕΣ ΩΡΕΣ', value: val('fEstimatedHours') },
    { type: 'spacer' },
    { type: 'section', text: 'SERVICE 3 / ΥΠΗΡΕΣΙΑ 3' },
    { type: 'data', label: 'PICK UP DATE & TIME / ΗΜΕΡΑ & ΩΡΑ ΠΑΡΑΛΑΒΗΣ', value: val('fService3DateTime') },
    { type: 'data', label: 'PICK UP POINT / ΣΗΜΕΙΟ ΠΑΡΑΛΑΒΗΣ', value: val('fPickup3') },
    { type: 'data', label: 'DROP OFF POINT / ΣΗΜΕΙΟ ΑΠΟΒΙΒΑΣΗΣ', value: 'HER AIRPORT' },
    { type: 'spacer' },
    { type: 'section', text: 'VEHICLE INFO / ΠΛΗΡΟΦΟΡΙΕΣ ΟΧΗΜΑΤΟΣ' },
    { type: 'data', label: 'CAR BRAND / ΜΑΡΚΑ ΟΧΗΜΑΤΟΣ', value: 'MERCEDES C CLASS' },
    { type: 'data', label: 'LICENSE PLATE / ΑΡ. ΚΥΚΛΟΦΟΡΙΑΣ', value: 'HZM 6777' },
    { type: 'data', label: "DRIVER'S NAME & ID / ΟΝΟΜΑ & Α.Δ.Τ. ΟΔΗΓΟΥ", value: 'ΡΑΣΙΔΑΚΗΣ ΙΩΑΝΝΗΣ - Α0 2084193' },
    { type: 'data', label: 'DRIVING LICENSE NR / ΑΡ.ΑΔΕΙΑΣ ΟΔΗΓΗΣΗΣ', value: '460080464' },
    { type: 'spacer' },
    { type: 'signature', label: 'STAMP & SIGN / ΣΦΡΑΓΙΔΑ & ΥΠΟΓΡΑΦΗ' }
  ];

  rows.forEach(row => {
    let excelRow;
    if (row.type === 'title') {
      excelRow = sheet.addRow([row.text]);
      sheet.mergeCells(`A${excelRow.number}:B${excelRow.number}`);
      excelRow.height = 28;
      const cell = excelRow.getCell(1);
      cell.font = { bold: true, size: 13, color: { argb: 'FFFFFFFF' } };
      cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F2937' } };
      cell.border = thinBorder;
    } else if (row.type === 'section') {
      excelRow = sheet.addRow([row.text]);
      sheet.mergeCells(`A${excelRow.number}:B${excelRow.number}`);
      excelRow.height = 19;
      const cell = excelRow.getCell(1);
      cell.font = { bold: true, size: 10.5, color: { argb: 'FFFFFFFF' } };
      cell.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4B5563' } };
      cell.border = thinBorder;
    } else if (row.type === 'data') {
      excelRow = sheet.addRow([row.label, row.value || '']);
      excelRow.height = 17;
      const labelCell = excelRow.getCell(1);
      const valueCell = excelRow.getCell(2);
      labelCell.font = { bold: true, size: 9.5 };
      labelCell.alignment = { vertical: 'middle', wrapText: true, indent: 1 };
      labelCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
      labelCell.border = thinBorder;
      valueCell.font = { size: 9.5 };
      valueCell.alignment = { vertical: 'middle', wrapText: true, indent: 1 };
      valueCell.border = thinBorder;
    } else if (row.type === 'signature') {
      excelRow = sheet.addRow([row.label, '']);
      excelRow.height = 42;
      const labelCell = excelRow.getCell(1);
      const valueCell = excelRow.getCell(2);
      labelCell.font = { bold: true, size: 9.5 };
      labelCell.alignment = { vertical: 'middle', wrapText: true, indent: 1 };
      labelCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
      labelCell.border = thinBorder;
      valueCell.border = thinBorder;
    } else {
      // spacer: small blank row, no borders, for breathing room between sections
      excelRow = sheet.addRow(['']);
      excelRow.height = 6;
    }
  });

  try {
    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `diataktiki_${bookingRef || 'export'}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error(err);
    alert('Σφάλμα κατά τη δημιουργία του Excel: ' + err.message);
  }
}

function resetForm() {
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('fileInput').value = '';
  currentFile = null;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status-${type}`;
  el.style.display = 'block';
  if (type !== 'loading') setTimeout(() => { el.style.display = 'none'; }, 4000);
}
